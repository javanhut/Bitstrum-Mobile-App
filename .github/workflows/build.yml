name: Build Mobile Apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate native project
        run: bunx expo prebuild --platform android --no-install

      - name: Enable JS bundle in debug APK
        run: |
          if ! grep -q '^react {$' android/app/build.gradle; then
            echo "::error::react { ... } block not found in android/app/build.gradle"
            exit 1
          fi
          sed -i '/^react {$/a\    bundleInDebug = true' android/app/build.gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -x lint -x test --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             bitstrum-mobile-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bitstrum-mobile-*.apk

  release:
    name: Create GitHub Release
    needs: [android]
    runs-on: ubuntu-latest

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
