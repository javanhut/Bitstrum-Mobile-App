name: Build Mobile Apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle') }}
          restore-keys: gradle-

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -x lint -x test --no-daemon

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/bitstrum-mobile-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/bitstrum-mobile-*.apk

  ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build unsigned .app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Bitstrum.xcworkspace \
            -scheme Bitstrum \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20

      - name: Package .app into zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd ios/build/Build/Products/Release-iphonesimulator
          zip -r "../../../../../bitstrum-mobile-ios-simulator-${VERSION}.zip" Bitstrum.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: bitstrum-mobile-ios-simulator-*.zip

  release:
    name: Create GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download iOS app
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
